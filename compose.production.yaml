services:
  concurseiro-web:
    build:
      context: .
      args:
        CONCURSEIRO_API_URL: ${CONCURSEIRO_API_URL}
        NEXT_PUBLIC_WEB_URL: ${NEXT_PUBLIC_WEB_URL}
        NEXT_PUBLIC_APP_DOWNLOAD_URL: ${NEXT_PUBLIC_APP_DOWNLOAD_URL:-}
        NEXT_PUBLIC_TELEMETRY_ENABLED: ${NEXT_PUBLIC_TELEMETRY_ENABLED:-false}
        NEXT_PUBLIC_IMAGE_HOSTNAMES: ${NEXT_PUBLIC_IMAGE_HOSTNAMES}
        CONCURSEIRO_DEPLOYMENT: production
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
